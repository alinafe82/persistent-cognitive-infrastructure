repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
  - repo: local
    hooks:
      - id: frontend-control-plane-lint
        name: Frontend control-plane lint
        entry: bash -lc 'cd frontend/control-plane && npm run lint'
        language: system
        pass_filenames: false
        files: ^frontend/control-plane/
      - id: frontend-control-plane-test
        name: Frontend control-plane tests
        entry: bash -lc 'cd frontend/control-plane && npm run test:coverage'
        language: system
        pass_filenames: false
        stages: [push]
        files: ^frontend/control-plane/
