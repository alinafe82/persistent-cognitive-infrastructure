global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8889

  - job_name: nats
    metrics_path: /varz
    static_configs:
      - targets:
          - nats:8222

  - job_name: control-plane
    metrics_path: /metrics
    static_configs:
      - targets:
          - control-plane:8080

