name: pci

services:
  control-plane:
    build:
      context: ../services/control-plane
    environment:
      PCI_ENVIRONMENT: local
      PCI_DATABASE_URL: postgresql://pci:pci@postgres:5432/pci # pragma: allowlist secret # gitleaks:allow
      PCI_NATS_URL: nats://nats:4222
      PCI_TEMPORAL_ADDRESS: temporal:7233
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - nats
      - redis
      - temporal

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pci
      POSTGRES_USER: pci
      POSTGRES_PASSWORD: pci # pragma: allowlist secret # gitleaks:allow
    ports:
      - "5432:5432"
    volumes:
      - pci-postgres:/var/lib/postgresql/data
      - ../schemas/sql/001_core.sql:/docker-entrypoint-initdb.d/001_core.sql:ro

  nats:
    image: nats:2.10
    command:
      - "-js"
      - "-m"
      - "8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - pci-nats:/data

  redis:
    image: redis:7-alpine
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
    ports:
      - "6379:6379"
    volumes:
      - pci-redis:/data

  temporal-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal # pragma: allowlist secret # gitleaks:allow
    volumes:
      - pci-temporal-postgres:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal # pragma: allowlist secret # gitleaks:allow
      POSTGRES_SEEDS: temporal-postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      - temporal-postgres

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8233:8080"
    depends_on:
      - temporal

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    command:
      - "--config=/etc/otelcol/config.yaml"
    volumes:
      - ./observability/otel/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - pci-prometheus:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin # pragma: allowlist secret # gitleaks:allow
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - pci-grafana:/var/lib/grafana
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  pci-postgres:
  pci-nats:
  pci-redis:
  pci-temporal-postgres:
  pci-prometheus:
  pci-grafana:
