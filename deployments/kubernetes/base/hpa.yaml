apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pci-control-plane
  namespace: pci
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pci-control-plane
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

