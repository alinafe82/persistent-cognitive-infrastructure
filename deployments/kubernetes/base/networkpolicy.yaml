apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pci-control-plane-default-deny
  namespace: pci
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pci-control-plane
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pci
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 7233
