name: Design change
description: Propose an architecture, API, schema, or runtime contract change.
title: "[Design]: "
labels:
  - design
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What runtime problem should this change solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the proposed change and affected contracts.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: List serious alternatives and why they are weaker.
    validations:
      required: true
  - type: checkboxes
    id: affected
    attributes:
      label: Affected areas
      options:
        - label: Event schemas
        - label: Graph schema
        - label: Scheduler
        - label: Reconciliation
        - label: Memory
        - label: Governance
        - label: Execution runtime
        - label: Public API
        - label: Deployment security
